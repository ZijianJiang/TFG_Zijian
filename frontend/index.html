<!DOCTYPE html>
<html>
<head>
<title>ViralScript</title>
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles/style.css">
</head>

<body>

<header class="header-bar">
	<div class="left">
		<button class="menu-button" id="sidebarToggle" aria-expanded="false" aria-controls="sidebar">
			<img src="styles/logo.svg" alt="Logo" class="sidebar-logo">
		</button>
	</div>

	<div class="right">
		<button class="auth-button" id="loginBtn">Iniciar sesión</button>
		<button class="auth-button" id="registerBtn">Registrarse</button>
	</div>

	<aside id="sidebar" class="sidebar collapsed" aria-hidden="false">
		<ul class="sidebar-list">
			<li id="newScript">
				<span class="icon" aria-hidden="true">
					<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" class="icon-svg"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>
				</span>
				<span class="label">Nuevo guión</span>
			</li>
		
		</ul>
		
			<div class="sidebar-footer">
				<div id="sidebarFooterLoggedOut">
					<p class="sidebar-note">Inicia sesión para poder guardar chats y generar insights personalizados sobre rendimiento, temas y oportunidades.</p>
					<button class="auth-button" id="sidebarLoginBtn">Iniciar sesión</button>
				</div>
				<div id="sidebarFooterLogged" style="display:none">
					<div class="user-info">Hola, <span id="usernameDisplay"></span></div>
					<button class="auth-button" id="sidebarLogoutBtn">Cerrar sesión</button>
				</div>
			</div>
	</aside>
</header>

<script>
  // Entry redirect: root page should open the home page under pages/
  const base = location.pathname;
  // If user opened index or root, redirect to pages/home.html
  if (location.pathname === '/' || location.pathname.endsWith('/index.html') || location.pathname === '') {
    location.replace('pages/home.html')
  }
</script>

<script src="js/app.js"></script>

</body>
</html>
