<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Iniciar sesión - ViralScript</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../styles/style.css">
</head>
<body class="auth-page">
  <header class="header-bar">
    <div class="left">
      <a class="brand brand-link" href="home.html" aria-label="Volver al generador">
        <img src="../styles/logo.svg" alt="ViralScript logo" class="sidebar-logo">
        <div class="brand-copy">
          <span class="app-title">ViralScript</span>
        </div>
      </a>
    </div>
  </header>

  <main class="auth-shell">
    <section class="auth-card" aria-labelledby="loginTitle">
      <div class="auth-copy">
        <p class="auth-kicker">Acceso seguro</p>
        <h1 id="loginTitle">Iniciar sesión</h1>
        <p class="auth-subtitle">Accede para guardar tus guiones y continuar trabajando.</p>
      </div>

      <div class="auth-fields">
        <div class="field-group auth-field">
          <label for="loginUsername">Usuario</label>
          <input id="loginUsername" class="input" placeholder="Usuario" autocomplete="username">
        </div>

        <div class="field-group auth-field">
          <label for="loginPassword">Contraseña</label>
          <input id="loginPassword" class="input" placeholder="Contraseña" type="password" autocomplete="current-password">
        </div>
      </div>

      <div class="auth-actions">
        <button id="doLogin" class="auth-button primary auth-submit">Entrar</button>
        <p class="auth-secondary-link">
          ¿No tienes cuenta?
          <a href="register.html">Registrarte</a>
        </p>
        <p class="auth-secondary-link">
          <a href="home.html">Volver al generador</a>
        </p>
      </div>

      <p id="msg" class="auth-message" aria-live="polite"></p>
    </section>
  </main>

  <script>
    function getApiBaseUrl() {
      if (window.__API_BASE_URL__) return String(window.__API_BASE_URL__).replace(/\/$/, '')
      if (window.location && window.location.protocol === 'file:') return 'http://127.0.0.1:3000'
      if (window.location && window.location.origin && window.location.origin !== 'null') return window.location.origin.replace(/\/$/, '')
      return 'http://127.0.0.1:3000'
    }

    document.getElementById('doLogin').addEventListener('click', async () => {
      const u = document.getElementById('loginUsername').value
      const p = document.getElementById('loginPassword').value
      if (!u || !p) return document.getElementById('msg').innerText = 'Introduce usuario y contraseña'
      try {
        const resp = await fetch(`${getApiBaseUrl()}/auth/login`, {
          method: 'POST', headers: {'Content-Type':'application/json'},
          body: JSON.stringify({ username: u, password: p })
        })
        const data = await resp.json()
        if (!resp.ok) throw new Error(data.error || 'login failed')
        localStorage.setItem('token', data.token)
        localStorage.setItem('username', data.username)
        location.href = 'home.html'
      } catch (e) {
        document.getElementById('msg').innerText = e.message
      }
    })
  </script>
</body>
</html>
