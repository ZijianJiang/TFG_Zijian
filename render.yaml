services:
  - type: web
    name: ai-content-creator
    env: node
    plan: free
    buildCommand: cd backend && npm ci
    startCommand: cd backend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_PATH
        value: /tmp/content.db
      - key: OPENAI_API_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
